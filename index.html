<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Find Near CARE</title>
  <!-- Apple-Style Premium Typography Engine -->
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <!-- Leaflet GIS Mapping Components -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="glass header">
  <div class="header-top">
    <!-- Inside the Header Container -->
<div class="logo-area">
  <img src="https://logosandtypes.com/wp-content/uploads/2024/01/Care-Hospitals.png" alt="CARE Logo" class="care-logo">
  <h1 class="apple-bold-title">Find Near CARE</h1>
</div>
    
    <div class="mac-credits">
      <span class="credits-text">Designed & Developed by our agent Murali Manohar •2026•</span>
    </div>
  </div>

  <div class="search-box">
    <div class="input-wrapper">
      <input id="search" placeholder="Enter city or area (e.g., Banjara, Hitech, Nagpur)..." onkeypress="handleKeyPress(event)"/>
      <!-- Apple Processing Spinner Element -->
      <div id="mac-spinner" class="mac-spinner hidden"></div>
    </div>
    <button onclick="triggerSearch()">🔍 Search</button>
  </div>
</div>

<div class="app-layout">
  <div id="results-wrapper">
    <!-- Dynamic Results Inject Target -->
    <div id="results"></div>
    
    <!-- Care Logo Magic Floating Animation Panel Structure -->
    <div id="no-results-state" class="hidden">
      <div class="magic-container">
        <div class="magic-glow"></div>
        <!-- FIXED: Wrapped in the magic floating badge container -->
        <div class="magic-badge-wrapper">
          <img src="Care-Hospitals_2.png" alt="CARE Magic Logo" class="magic-logo">
        </div>
        <p class="magic-text">No hospitals found matching your area.</p>
        <span class="magic-subtext">Try refining your search keywords</span>
      </div>
    </div>
  </div>
  
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
