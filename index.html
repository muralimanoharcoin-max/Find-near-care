<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Find Near CARE</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="glass header">
  <div class="logo-area">
    <!-- SVG Vector CARE Logo replacement -->
    <svg class="care-logo" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="40" rx="8" fill="#1e3a8a"/>
      <text x="50" y="25" font-family="'SF Pro Display', sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">CARE</text>
    </svg>
    <h1>Find Near CARE</h1>
  </div>
  
  <div class="header-right">
    <div class="mac-credits">
      <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
      <span class="credits-text">Designed & Developed by our agent Murali Manohar 2026</span>
    </div>
    <div class="search-box">
      <input id="search" placeholder="Enter city or area..." onkeypress="handleKeyPress(event)"/>
      <button onclick="triggerSearch()">🔍 Search</button>
    </div>
  </div>
</div>

<div id="map"></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
