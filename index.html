<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find Near CARE</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mac-viewport-container">
        
        <header class="mac-header glass">
            <div class="header-top">
                <div class="logo-area">
                    <img src="Care-Hospitals.png" alt="CARE Logo" class="care-logo-premium">
                    <h1 class="apple-title">Find Near CARE</h1>
                </div>
                <div class="mac-credits-wrapper">
                    <span class="steel-shine">Designed & Developed by our agent Murali Manohar • 2026</span>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search" placeholder="Enter city, area, village, or landmark..." onkeypress="handleKeyPress(event)" autocomplete="off">
                    <div id="mac-spinner" class="mac-spinner hidden"></div>
                    <button onclick="triggerSearch()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Search
                    </button>
                </div>
            </div>
        </header>

        <main class="app-layout">
            
            <section id="results-wrapper">
                <div id="results">
                    </div>
                
                <div id="no-results-state" class="hidden">
                    <div class="magic-container">
                        <div class="magic-glow"></div>
                        <img src="Care-Hospitals.png" alt="CARE Magic Logo" class="magic-logo">
                        <p class="magic-text">No hospitals found matching your area.</p>
                        <span class="magic-subtext">Try refining your search keywords</span>
                    </div>
                </div>
            </section>
            
            <section class="map-view-canvas">
                <div id="map"></div>
            </section>

        </main>

        <footer class="bottom-dashboard glass">
            
            <div class="slider-outer-container">
                <div class="slider-track" id="address-slider-track">
                </div>
            </div>
            
            <div class="mac-meta-dock">
                <div class="dock-left">
                    <span class="dock-bold">About CARE Network:</span>
                    <span class="dock-desc">Providing continuous premium tertiary clinical support across diverse geographical zones.</span>
                </div>
                <div class="dock-right">
                    <span>System Platform: <b>v4.2.0-Production</b></span>
                </div>
            </div>

            <div class="brand-base-stripe"></div>
        </footer>

    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
