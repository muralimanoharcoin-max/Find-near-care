<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Find Near CARE</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="glass header">
  <div class="header-top">
    <div class="logo-area">
      <img src="Care-Hospitals-removebg-preview.png" alt="CARE Logo" class="care-logo">
      <h1 class="apple-bold-title">Find Near CARE</h1>
    </div>
    
    <div class="mac-credits">
      <span class="credits-text">Designed & Developed by Murali Manohar •2026•</span>
    </div>
  </div>

  <div class="search-box">
    <div class="input-wrapper">
      <input type="text" id="search" placeholder="Enter city, town, or village..." onkeypress="handleKeyPress(event)" oninput="handleInputSuggestions(event)" autocomplete="off">
      <div id="mac-spinner" class="mac-spinner hidden"></div>
      <div id="suggestions-dropdown" class="suggestions-box hidden"></div>
    </div>
    <button onclick="triggerSearch()">Search</button>
  </div>
</div>

<div class="app-layout">
  <div id="results-wrapper">
    <div id="results"></div>
    
    <div id="no-results-state" class="hidden">
      <div class="magic-container">
        <div class="magic-glow"></div>
        <div class="dotted-ring ring-outer"></div>
        <div class="dotted-ring ring-middle"></div>
        <div class="dotted-ring ring-inner"></div>
        <img src="Care-Hospitals-removebg-preview.png" class="magic-logo" alt="CARE Logo">
        <div class="magic-text">A promise of 99.9% accurate information</div>
        <div class="magic-subtext">Enter a city or area to begin automated coordinate scanning.</div>
      </div>
    </div>
  </div>
  
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
